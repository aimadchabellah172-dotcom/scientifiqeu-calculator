<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>??? ????? ?????</title>

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    background: #222;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px #000;
}

#screen {
    width: 100%;
    height: 60px;
    font-size: 22px;
    margin-bottom: 15px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: #0f0;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 10px;
}

button {
    height: 55px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #444;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #666;
}

.operator { background: #ff9500; }
.equal { background: #28a745; }
.clear { background: #dc3545; }
</style>

</head>
<body>

<div class="calculator">
    <input type="text" id="screen">

    <div class="buttons">
        <button onclick="clearScreen()" class="clear">C</button>
        <button onclick="del()">?</button>
        <button onclick="add('(')">(</button>
        <button onclick="add(')')">)</button>
        <button onclick="add('/')" class="operator">„</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('*')" class="operator">ū</button>
        <button onclick="sqrt()">?</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')" class="operator">-</button>
        <button onclick="square()">x▓</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('+')" class="operator">+</button>
        <button onclick="power()">x?</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button onclick="pi()">?</button>
        <button onclick="e()">e</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button onclick="log()">log</button>
        <button onclick="ln()">ln</button>
    </div>
</div>

<script>
function add(val){
    document.getElementById("screen").value += val;
}

function clearScreen(){
    document.getElementById("screen").value = "";
}

function del(){
    let s = document.getElementById("screen");
    s.value = s.value.slice(0,-1);
}

function calculate(){
    try{
        document.getElementById("screen").value =
        eval(document.getElementById("screen").value);
    }catch{
        alert("???");
    }
}

function sin(){
    let v = get();
    set(Math.sin(v * Math.PI/180));
}

function cos(){
    let v = get();
    set(Math.cos(v * Math.PI/180));
}

function tan(){
    let v = get();
    set(Math.tan(v * Math.PI/180));
}

function log(){
    set(Math.log10(get()));
}

function ln(){
    set(Math.log(get()));
}

function sqrt(){
    set(Math.sqrt(get()));
}

function square(){
    let v = get();
    set(v*v);
}

function power(){
    add("**");
}

function pi(){
    add(Math.PI);
}

function e(){
    add(Math.E);
}

function get(){
    return parseFloat(document.getElementById("screen").value);
}

function set(val){
    document.getElementById("screen").value = val;
}
</script>

</body>
</html>
