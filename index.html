<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.layout{
display:flex;
flex-wrap:wrap;
gap:15px;
}

/* 🧮 calculator */
.calc{
width:380px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.screen{
width:100%;
height:70px;
font-size:24px;
border:none;
border-radius:10px;
padding:10px;
background:rgba(255,255,255,0.1);
color:white;
}

/* buttons rows */
.row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:8px;
}

.btn{
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
background:#38bdf8;
color:black;
transform:scale(1.05);
}

.btn:active{
transform:scale(0.95);
}

/* panels */
.panel{
flex:1;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
margin-top:10px;
}

/* stars */
.stars span{
font-size:30px;
cursor:pointer;
color:#555;
}

.stars span.active{
color:gold;
}

/* comment */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

.comment{
background:rgba(255,255,255,0.1);
padding:10px;
margin-top:10px;
border-radius:10px;
}

canvas{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية احترافية</h2>

<div class="layout">

<!-- CALCULATOR -->
<div class="calc">

<input id="screen" class="screen" disabled>

<!-- 🔢 ROW 1 -->
<div class="row">
<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>
</div>

<!-- ROW 2 -->
<div class="row">
<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>
</div>

<!-- ROW 3 -->
<div class="row">
<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>
</div>

<!-- ROW 4 -->
<div class="row">
<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>
</div>

<!-- ROW 5 SHIFT -->
<div class="row">
<button class="btn" onclick="shift()">SHIFT</button>
<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>
</div>

<!-- ROW 6 SCIENTIFIC -->
<div class="row">
<button class="btn" onclick="sqrt()">√</button>
<button class="btn" onclick="power()">xʸ</button>
<button class="btn" onclick="log10()">log</button>
<button class="btn" onclick="ln()">ln</button>
</div>

<!-- ROW 7 -->
<div class="row">
<button class="btn" onclick="clearAll()">C</button>
<button class="btn" onclick="MC()">MC</button>
<button class="btn" onclick="MR()">MR</button>
<button class="btn" onclick="voice()">🎤</button>
</div>

</div>

<!-- GRAPH -->
<div class="panel">
<h3>📊 Graph متعدد الدوال</h3>
<input id="funcs" placeholder="x*x; sin(x); x+2">
<button class="btn" onclick="draw()">رسم</button>
<canvas id="chart"></canvas>
</div>

<!-- AI -->
<div class="panel">
<h3>🤖 حل المعادلات</h3>
<input id="ai" placeholder="2x+3=7">
<button class="btn" onclick="solve()">حل</button>
<p id="out"></p>
</div>

<!-- rating -->
<div class="panel">
<h3>⭐ التقييم</h3>
<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
<p id="rateText"></p>
</div>

<!-- comments -->
<div class="panel">
<h3>💬 التعليقات</h3>

<input id="name" placeholder="اسمك">
<textarea id="msg" placeholder="تعليقك"></textarea>

<button class="btn" onclick="addComment()">إرسال</button>

<div id="comments"></div>

</div>

</div>

<script>

let screen=document.getElementById("screen");
let chart;
let memory=0;
let shiftMode=false;

/* calc */
function add(v){screen.value+=v;}
function addFunc(f){screen.value+=f+"(";}

/* scientific */
function sqrt(){screen.value=Math.sqrt(eval(screen.value));}
function power(){screen.value+="**";}
function log10(){screen.value=Math.log10(eval(screen.value));}
function ln(){screen.value=Math.log(eval(screen.value));}
function clearAll(){screen.value="";}

/* calc */
function calc(){
try{
let e=screen.value;

e=e.replace(/sin\(/g,"Math.sin(Math.PI/180*");
e=e.replace(/cos\(/g,"Math.cos(Math.PI/180*");
e=e.replace(/tan\(/g,"Math.tan(Math.PI/180*");
e=e.replace(/\^/g,"**");

screen.value=eval(e);
}catch{screen.value="خطأ";}
}

/* SHIFT */
function shift(){
shiftMode=!shiftMode;
alert(shiftMode?"SHIFT ON":"SHIFT OFF");
}

/* memory */
function MC(){memory=0;}
function MR(){screen.value+=memory;}
function Mplus(){memory+=Number(eval(screen.value||0));}
function Mminus(){memory-=Number(eval(screen.value||0));}

/* 🎤 voice */
function voice(){
let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ar";
rec.start();
rec.onresult=e=>{
screen.value=e.results[0][0].transcript
.replace(/جمع/g,"+")
.replace(/ضرب/g,"*")
.replace(/قسمة/g,"/");
};
}

/* 📊 graph */
function draw(){
let f=document.getElementById("funcs").value.split(";");
let x=[],sets=[];

for(let i=-10;i<=10;i++)x.push(i);

f.forEach((fn,i)=>{
let y=[];
for(let xVal=-10;xVal<=10;xVal++){
try{
y.push(eval(fn.replace(/x/g,xVal)));
}catch{y.push(0);}
}
sets.push({label:fn,data:y,borderColor:["red","blue","green"][i%3]});
});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:x,datasets:sets}
});
}

/* AI solve */
function solve(){
let eq=document.getElementById("ai").value.split("=");
let L=eq[0],R=eq[1];

for(let i=-100;i<100;i++){
if(Math.abs(eval(L.replace(/x/g,i))-eval(R))<0.1){
document.getElementById("out").innerText="x ≈ "+i;
break;
}
}
}

/* rating */
function rate(n){
document.querySelectorAll(".stars span").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
document.getElementById("rateText").innerText="تقييمك "+n+"/5";
}

/* comments */
function addComment(){
let n=document.getElementById("name").value;
let m=document.getElementById("msg").value;
if(!n||!m)return;

let c=JSON.parse(localStorage.getItem("c")||"[]");
c.unshift({n,m});
localStorage.setItem("c",JSON.stringify(c));
load();
}

function load(){
let box=document.getElementById("comments");
let c=JSON.parse(localStorage.getItem("c")||"[]");
box.innerHTML="";
c.forEach(v=>{
box.innerHTML+=`<div class="comment"><b>${v.n}</b><p>${v.m}</p></div>`;
});
}

window.onload=load;

</script>

</body>
</html>
