<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>آلة حاسبة علمية</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.calculator {
  background: #2c2c3e;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
}

#display {
  width: 100%;
  height: 60px;
  font-size: 22px;
  margin-bottom: 10px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 8px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

button {
  padding: 15px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.operator { background: #ff9500; color: white; }
.equal { background: #28a745; color: white; grid-column: span 2; }
.clear { background: #dc3545; color: white; }
.func { background: #6c63ff; color: white; }

</style>

</head>

<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button class="func" onclick="append('Math.sqrt(')">√</button>
    <button class="func" onclick="append('Math.pow(')">x²</button>

```
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="func" onclick="append('Math.sin(')">sin</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('*')">×</button>
<button class="func" onclick="append('Math.cos(')">cos</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('-')">−</button>
<button class="func" onclick="append('Math.tan(')">tan</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="operator" onclick="append('+')">+</button>
<button class="equal" onclick="calculate()">=</button>
```

  </div>
</div>

<script>
function append(value) {
  document.getElementById("display").value += value;
}

function clearDisplay() {
  document.getElementById("display").value = "";
}

function calculate() {
  try {
    let result = eval(document.getElementById("display").value);
    document.getElementById("display").value = result;
  } catch {
    alert("خطأ في العملية");
  }
}
</script>

</body>
</html>
