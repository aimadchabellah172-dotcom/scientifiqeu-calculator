<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية</title>

<style>
:root{
  --bg:#f4f4f4;
  --card:#ffffff;
  --text:#111;
  --btn:#e0e0e0;
  --accent:#4a90e2;
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --btn:#334155;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Calculator */
.calculator{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.screen{
  width:100%;
  height:60px;
  font-size:22px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--bg);
  color:var(--text);
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  cursor:pointer;
}

.btn:hover{
  background:var(--accent);
  color:white;
}

/* Cards */
.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

/* Comments */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  background:var(--bg);
  color:var(--text);
}

.comment{
  background:var(--bg);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>آلة حاسبة علمية</h2>
    <button onclick="toggleTheme()">🌙 تبديل الوضع</button>
  </div>

  <div style="display:flex; gap:20px; flex-wrap:wrap;">

    <!-- Calculator -->
    <div class="calculator">
      <input id="screen" class="screen" disabled>

      <div class="buttons">
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn" onclick="press('/')">/</button>

        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn" onclick="press('*')">*</button>

        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn" onclick="press('-')">-</button>

        <button class="btn" onclick="press('0')">0</button>
        <button class="btn" onclick="press('.')">.</button>
        <button class="btn" onclick="calc()">=</button>
        <button class="btn" onclick="press('+')">+</button>

        <button class="btn" onclick="clearScreen()">C</button>
      </div>
    </div>

    <!-- Explanation -->
    <div class="card" style="flex:1;">
      <h3>طريقة عمل الحاسبة</h3>
      <p>تعتمد على JavaScript لتنفيذ العمليات الرياضية باستخدام eval و Math.</p>
    </div>

  </div>

  <!-- Rating -->
  <div class="card">
    <h3>تقييم الموقع</h3>
    <p>اضغط لتقييم الموقع:</p>
    <div id="stars">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>
  </div>

  <!-- Comments System -->
  <div class="card">
    <h3>التعليقات</h3>

    <input id="name" placeholder="اسمك">
    <textarea id="comment" placeholder="اكتب تعليقك"></textarea>

    <button class="btn" onclick="addComment()">إرسال</button>

    <div id="commentsList"></div>
  </div>

</div>

<script>

let screen = document.getElementById("screen");

function press(v){
  screen.value += v;
}

function calc(){
  try{
    screen.value = eval(screen.value);
  }catch{
    screen.value = "خطأ";
  }
}

function clearScreen(){
  screen.value = "";
}

function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* Rating */
function rate(n){
  localStorage.setItem("rating", n);
  alert("تم التقييم: " + n);
}

/* Comments */
function addComment(){
  let name = document.getElementById("name").value;
  let text = document.getElementById("comment").value;

  if(!name || !text){
    alert("اكتب الاسم والتعليق");
    return;
  }

  let comments = JSON.parse(localStorage.getItem("comments") || "[]");

  comments.push({name, text});

  localStorage.setItem("comments", JSON.stringify(comments));

  document.getElementById("name").value = "";
  document.getElementById("comment").value = "";

  loadComments();
}

function loadComments(){
  let comments = JSON.parse(localStorage.getItem("comments") || "[]");
  let box = document.getElementById("commentsList");

  box.innerHTML = "";

  comments.forEach(c=>{
    box.innerHTML += `
      <div class="comment">
        <b>${c.name}</b>
        <p>${c.text}</p>
      </div>
    `;
  });
}

window.onload = loadComments;

</script>

</body>
</html>
