<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🎨 خلفية احترافية */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

/* container */
.container{
width:100%;
max-width:1200px;
}

/* layout */
.layout{
display:flex;
gap:20px;
flex-wrap:wrap;
}

/* 🧮 calculator */
.calc{
width:360px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* screen */
.screen{
width:100%;
height:70px;
font-size:26px;
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.1);
color:white;
text-align:left;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

/* 🔘 buttons */
.btn{
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(145deg,#334155,#1e293b);
color:white;
cursor:pointer;
transition:0.2s;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

.btn:hover{
transform:scale(1.08);
background:linear-gradient(145deg,#38bdf8,#2563eb);
}

.btn:active{
transform:scale(0.95);
}

/* panels */
.panel{
flex:1;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* stars */
.stars span{
font-size:30px;
cursor:pointer;
color:#555;
transition:0.2s;
}

.stars span.active{
color:gold;
transform:scale(1.2);
}

/* comment */
textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

.comment{
background:rgba(255,255,255,0.1);
margin-top:10px;
padding:10px;
border-radius:10px;
}

/* chart */
canvas{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية احترافية</h2>

<div class="layout">

<!-- calculator -->
<div class="calc">

<input id="screen" class="screen" disabled>

<div class="grid">

<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>

<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>

<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>

<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>

<!-- 🔥 scientific -->
<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>
<button class="btn" onclick="sqrt()">√</button>

<button class="btn" onclick="power()">xʸ</button>
<button class="btn" onclick="log10()">log</button>
<button class="btn" onclick="ln()">ln</button>
<button class="btn" onclick="clearAll()">C</button>

</div>
</div>

<!-- graph -->
<div class="panel">
<h3>📈 الرسم البياني</h3>
<input id="func" placeholder="x*x أو sin(x)">
<button class="btn" onclick="draw()">رسم</button>
<canvas id="chart"></canvas>
</div>

<!-- rating -->
<div class="panel">
<h3>⭐ التقييم</h3>
<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
<p id="rateText"></p>
</div>

</div>

<script>

let screen=document.getElementById("screen");
let chart;

/* input */
function add(v){screen.value+=v;}
function addFunc(f){screen.value+=f+"(";}

/* √ */
function sqrt(){
screen.value=Math.sqrt(eval(screen.value));
}

/* power */
function power(){
screen.value+="**";
}

/* log */
function log10(){
screen.value=Math.log10(eval(screen.value));
}

function ln(){
screen.value=Math.log(eval(screen.value));
}

/* calc */
function calc(){
try{
let e=screen.value;

e=e.replace(/sin\(/g,"Math.sin(Math.PI/180*");
e=e.replace(/cos\(/g,"Math.cos(Math.PI/180*");
e=e.replace(/tan\(/g,"Math.tan(Math.PI/180*");

screen.value=eval(e);
}catch{
screen.value="خطأ";
}
}

/* clear */
function clearAll(){screen.value="";}

/* graph */
function draw(){
let f=document.getElementById("func").value;
let x=[],y=[];

for(let i=-10;i<=10;i++){
x.push(i);
try{
let e=f.replace(/x/g,i);
y.push(eval(e));
}catch{y.push(0);}
}

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:x,datasets:[{data:y,borderColor:"cyan"}]}
});
}

/* rating */
function rate(n){
document.querySelectorAll(".stars span").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
document.getElementById("rateText").innerText="تقييمك "+n+"/5";
}

</script>

</body>
</html>
