<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --btn:#e9eef5;
  --accent:#4a90e2;
}

body.dark{
  --bg:#0b1220;
  --card:#1b2435;
  --text:#f8fafc;
  --btn:#2a354b;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family: Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

/* layout */
.layout{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

/* calculator */
.calc{
  width:360px;
  background:var(--card);
  border-radius:20px;
  padding:15px;
}

.screen{
  width:100%;
  height:70px;
  font-size:24px;
  border:none;
  border-radius:10px;
  background:var(--bg);
  color:var(--text);
  padding:10px;
}

/* buttons */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  cursor:pointer;
}

.btn:hover{
  background:var(--accent);
  color:white;
}

/* panels */
.panel{
  flex:1;
  background:var(--card);
  border-radius:20px;
  padding:15px;
}

/* history */
.history{
  max-height:200px;
  overflow:auto;
  font-size:14px;
}

/* graph */
canvas{
  background:white;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية احترافية</h2>
<button onclick="toggleTheme()">🌙 تغيير الوضع</button>

<div class="layout">

<!-- CALCULATOR -->
<div class="calc">

<input id="screen" class="screen" disabled>

<div class="grid">

<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>

<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>

<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>

<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>

<!-- scientific -->
<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>
<button class="btn" onclick="add('^')">^</button>

<button class="btn" onclick="sqrt()">√</button>
<button class="btn" onclick="log10()">log</button>
<button class="btn" onclick="ln()">ln</button>
<button class="btn" onclick="clearAll()">C</button>

<!-- memory -->
<button class="btn" onclick="MC()">MC</button>
<button class="btn" onclick="MR()">MR</button>
<button class="btn" onclick="Mplus()">M+</button>
<button class="btn" onclick="Mminus()">M-</button>

</div>
</div>

<!-- HISTORY -->
<div class="panel">
<h3>🧾 سجل العمليات</h3>
<div class="history" id="history"></div>
</div>

<!-- GRAPH -->
<div class="panel">
<h3>📈 الرسم البياني</h3>

<input id="funcInput" placeholder="مثال: x*x أو sin(x)" style="width:100%;padding:10px;">
<button class="btn" onclick="drawGraph()">رسم</button>

<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

let screen = document.getElementById("screen");
let memory = 0;

/* input */
function add(v){
  screen.value += v;
}

function addFunc(f){
  screen.value += f + "(";
}

/* scientific */
function sqrt(){
  screen.value = Math.sqrt(eval(screen.value));
}

function log10(){
  screen.value = Math.log10(eval(screen.value));
}

function ln(){
  screen.value = Math.log(eval(screen.value));
}

/* calc */
function calc(){
  try{
    let expr = screen.value;

    expr = expr.replace(/sin\(/g,"Math.sin(Math.PI/180*");
    expr = expr.replace(/cos\(/g,"Math.cos(Math.PI/180*");
    expr = expr.replace(/tan\(/g,"Math.tan(Math.PI/180*");
    expr = expr.replace(/\^/g,"**");

    let result = eval(expr);

    addHistory(screen.value + " = " + result);
    screen.value = result;

  }catch{
    screen.value = "خطأ";
  }
}

/* history */
function addHistory(text){
  let h = document.getElementById("history");
  h.innerHTML = "<div>" + text + "</div>" + h.innerHTML;
}

/* clear */
function clearAll(){
  screen.value = "";
}

/* memory system */
function MC(){ memory = 0; }

function MR(){ screen.value += memory; }

function Mplus(){
  memory += Number(eval(screen.value || 0));
}

function Mminus(){
  memory -= Number(eval(screen.value || 0));
}

/* theme */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* GRAPH */
let chart;

function drawGraph(){
  let input = document.getElementById("funcInput").value;

  let xVals = [];
  let yVals = [];

  for(let x=-10;x<=10;x++){
    xVals.push(x);

    try{
      let expr = input
        .replace(/x/g, `(${x})`)
        .replace(/sin/g,"Math.sin")
        .replace(/cos/g,"Math.cos")
        .replace(/tan/g,"Math.tan");

      yVals.push(eval(expr));
    }catch{
      yVals.push(0);
    }
  }

  let ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:xVals,
      datasets:[{
        label:"Graph",
        data:yVals,
        borderColor:"blue",
        fill:false
      }]
    }
  });
}

</script>

</body>
</html>
