
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{max-width:1200px;margin:auto;padding:15px;}

.layout{display:flex;gap:15px;flex-wrap:wrap;}

/* calculator */
.calc{
width:380px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.screen{
width:100%;
height:70px;
font-size:24px;
border:none;
border-radius:10px;
padding:10px;
background:rgba(255,255,255,0.1);
color:white;
}

/* buttons */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}

.btn{
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
cursor:pointer;
transition:0.2s;
}

.btn:hover{transform:scale(1.05);background:#38bdf8;color:black;}
.btn:active{transform:scale(0.95);}

/* panels */
.panel{
flex:1;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* stars */
.stars span{font-size:30px;color:#555;cursor:pointer;}
.stars span.active{color:gold;}

/* comment */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

.comment{
background:rgba(255,255,255,0.1);
padding:10px;
margin-top:10px;
border-radius:10px;
}

/* mic */
.mic{
background:red;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

canvas{background:white;border-radius:10px;}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية متقدمة جدًا</h2>

<div class="layout">

<!-- CALC -->
<div class="calc">

<input id="screen" class="screen" disabled>

<div class="grid">

<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>

<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>

<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>

<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>

<!-- SHIFT -->
<button class="btn" onclick="shiftMode()">SHIFT</button>
<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>

<button class="btn" onclick="sqrt()">√</button>
<button class="btn" onclick="add('^')">xʸ</button>
<button class="btn" onclick="clearAll()">C</button>
<button class="btn mic" onclick="voice()">🎤</button>

</div>
</div>

<!-- GRAPH -->
<div class="panel">
<h3>📊 Graph متعدد الدوال</h3>

<input id="funcs" placeholder="مثال: x*x; sin(x); x+2">
<button class="btn" onclick="drawMulti()">رسم</button>

<canvas id="chart"></canvas>
</div>

<!-- AI -->
<div class="panel">
<h3>🤖 AI حل المعادلات</h3>

<input id="aiInput" placeholder="اكتب معادلة مثل: 2x+3=7">
<button class="btn" onclick="solveAI()">حل</button>
<p id="aiOut"></p>
</div>

<!-- rating -->
<div class="panel">
<h3>⭐ التقييم</h3>

<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>

<p id="rateText"></p>
</div>

<!-- comments -->
<div class="panel">
<h3>💬 التعليقات</h3>

<input id="name" placeholder="اسمك">
<textarea id="msg" placeholder="تعليقك"></textarea>

<button class="btn" onclick="addComment()">إرسال</button>

<div id="comments"></div>

</div>

</div>

<script>

let screen=document.getElementById("screen");
let chart;
let shift=false;

/* calc */
function add(v){screen.value+=v;}
function addFunc(f){screen.value+=f+"(";}

function sqrt(){screen.value=Math.sqrt(eval(screen.value));}

function clearAll(){screen.value="";}

/* SHIFT mode */
function shiftMode(){
shift=!shift;
alert(shift?"SHIFT ON":"SHIFT OFF");
}

/* calc */
function calc(){
try{
let e=screen.value;

e=e.replace(/sin\(/g,"Math.sin(Math.PI/180*");
e=e.replace(/cos\(/g,"Math.cos(Math.PI/180*");
e=e.replace(/tan\(/g,"Math.tan(Math.PI/180*");
e=e.replace(/\^/g,"**");

screen.value=eval(e);
}catch{screen.value="خطأ";}
}

/* 🎤 voice */
function voice(){
let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ar";
rec.start();

rec.onresult=(e)=>{
screen.value=e.results[0][0].transcript
.replace(/جمع/g,"+")
.replace(/ضرب/g,"*")
.replace(/قسمة/g,"/");
};
}

/* 📊 multi graph */
function drawMulti(){
let input=document.getElementById("funcs").value.split(";");

let x=[],datasets=[];

for(let i=-10;i<=10;i++)x.push(i);

input.forEach((f,i)=>{
let y=[];
for(let xVal=-10;xVal<=10;xVal++){
try{
let e=f.replace(/x/g,xVal);
y.push(eval(e));
}catch{y.push(0);}
}

datasets.push({
label:f,
data:y,
borderColor:["red","blue","green","orange"][i%4],
fill:false
});
});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:x,datasets}
});
}

/* 🤖 AI solver */
function solveAI(){
let eq=document.getElementById("aiInput").value;

try{
let parts=eq.split("=");
let left=parts[0];
let right=parts[1];

let x=0;
let step=0.01;

for(let i=-100;i<100;i+=step){
let L=eval(left.replace(/x/g,i));
let R=eval(right);
if(Math.abs(L-R)<0.1){
x=i;
break;
}
}

document.getElementById("aiOut").innerText="الحل التقريبي: x ≈ "+x;

}catch{
document.getElementById("aiOut").innerText="خطأ في المعادلة";
}
}

/* ⭐ rating */
function rate(n){
document.querySelectorAll(".stars span").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
document.getElementById("rateText")="تقييمك "+n+"/5";
}

/* 💬 comments */
function addComment(){
let n=document.getElementById("name").value;
let m=document.getElementById("msg").value;
if(!n||!m)return;

let c=JSON.parse(localStorage.getItem("c")||"[]");
c.unshift({n,m});
localStorage.setItem("c",JSON.stringify(c));
load();
}

function load(){
let box=document.getElementById("comments");
let c=JSON.parse(localStorage.getItem("c")||"[]");
box.innerHTML="";
c.forEach(v=>{
box.innerHTML+=`<div class="comment"><b>${v.n}</b><p>${v.m}</p></div>`;
});
}

window.onload=load;

</script>

</body>
</html>
