<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --text:#111;
  --btn:#e9eef5;
  --accent:#4a90e2;
}

body.dark{
  --bg:#0b1220;
  --card:#1b2435;
  --text:#f8fafc;
  --btn:#2a354b;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

.layout{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

/* calculator */
.calc{
  width:360px;
  background:var(--card);
  padding:15px;
  border-radius:20px;
}

.screen{
  width:100%;
  height:70px;
  font-size:24px;
  border:none;
  border-radius:10px;
  background:var(--bg);
  color:var(--text);
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  cursor:pointer;
}

.btn:hover{
  background:var(--accent);
  color:#fff;
}

/* panels */
.panel{
  flex:1;
  background:var(--card);
  padding:15px;
  border-radius:20px;
}

/* history */
.history{
  max-height:200px;
  overflow:auto;
}

/* stars */
.stars{
  font-size:30px;
  cursor:pointer;
}

.stars span{
  color:#bbb;
}

.stars span.active{
  color:gold;
}

/* comments */
textarea,input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:var(--bg);
  color:var(--text);
}

.comment{
  background:var(--bg);
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

canvas{
  background:#fff;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية احترافية</h2>
<button onclick="toggleTheme()">🌙 الوضع</button>

<div class="layout">

<!-- calculator -->
<div class="calc">

<input id="screen" class="screen" disabled>

<div class="grid">

<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>

<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>

<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>

<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>

<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>
<button class="btn" onclick="clearAll()">C</button>

<button class="btn" onclick="MC()">MC</button>
<button class="btn" onclick="MR()">MR</button>
<button class="btn" onclick="Mplus()">M+</button>
<button class="btn" onclick="Mminus()">M-</button>

</div>
</div>

<!-- history -->
<div class="panel">
<h3>🧾 السجل</h3>
<div class="history" id="history"></div>
</div>

<!-- graph -->
<div class="panel">
<h3>📈 الرسم البياني</h3>
<input id="func" placeholder="مثال: x*x أو sin(x)">
<button class="btn" onclick="draw()">رسم</button>
<canvas id="chart"></canvas>
</div>

</div>

<!-- rating -->
<div class="panel">
<h3>⭐ التقييم</h3>
<div class="stars" id="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
<p id="rateText"></p>
</div>

<!-- comments -->
<div class="panel">
<h3>💬 التعليقات</h3>

<input id="name" placeholder="اسمك">
<textarea id="msg" placeholder="تعليقك"></textarea>

<button class="btn" onclick="addComment()">إرسال</button>

<div id="comments"></div>
</div>

</div>

<script>

let screen=document.getElementById("screen");
let memory=0;
let chart;

/* calc */
function add(v){screen.value+=v;}
function addFunc(f){screen.value+=f+"(";}

function calc(){
try{
let e=screen.value;
e=e.replace(/sin\(/g,"Math.sin(Math.PI/180*");
e=e.replace(/cos\(/g,"Math.cos(Math.PI/180*");
e=e.replace(/tan\(/g,"Math.tan(Math.PI/180*");
e=e.replace(/\^/g,"**");

let r=eval(e);
addHistory(screen.value+" = "+r);
screen.value=r;
}catch{screen.value="خطأ";}
}

function clearAll(){screen.value="";}

/* memory */
function MC(){memory=0;}
function MR(){screen.value+=memory;}
function Mplus(){memory+=Number(eval(screen.value||0));}
function Mminus(){memory-=Number(eval(screen.value||0));}

/* history */
function addHistory(t){
document.getElementById("history").innerHTML="<div>"+t+"</div>"+document.getElementById("history").innerHTML;
}

/* theme */
function toggleTheme(){document.body.classList.toggle("dark");}

/* graph */
function draw(){
let f=document.getElementById("func").value;
let x=[],y=[];
for(let i=-10;i<=10;i++){
x.push(i);
try{
let e=f.replace(/x/g,i);
y.push(eval(e));
}catch{y.push(0);}
}

if(chart)chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:x,datasets:[{data:y,borderColor:"blue"}]}
});
}

/* rating */
function rate(n){
localStorage.setItem("rate",n);
update(n);
}

function update(n){
document.querySelectorAll(".stars span").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
document.getElementById("rateText").innerText="تقييمك "+n+"/5";
}

/* comments */
function addComment(){
let n=document.getElementById("name").value;
let m=document.getElementById("msg").value;
if(!n||!m)return;

let c=JSON.parse(localStorage.getItem("c")||"[]");
c.unshift({n,m});
localStorage.setItem("c",JSON.stringify(c));
load();
}

function load(){
let box=document.getElementById("comments");
let c=JSON.parse(localStorage.getItem("c")||"[]");
box.innerHTML="";
c.forEach(v=>{
box.innerHTML+=`<div class="comment"><b>${v.n}</b><p>${v.m}</p></div>`;
});
}

/* init */
window.onload=()=>{
load();
let r=localStorage.getItem("rate");
if(r)update(Number(r));
};

</script>

</body>
</html>
