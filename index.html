<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية</title>

<style>
:root{
  --bg:#f4f4f4;
  --card:#ffffff;
  --text:#111;
  --btn:#e0e0e0;
  --accent:#4a90e2;
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --btn:#334155;
  --accent:#38bdf8;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  cursor:pointer;
}

/* Calculator */
.calculator{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:320px;
}

.screen{
  width:100%;
  height:60px;
  font-size:22px;
  text-align:left;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:var(--bg);
  color:var(--text);
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.btn{
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--btn);
  font-size:16px;
}

.btn:hover{
  background:var(--accent);
  color:white;
}

/* Sections */
.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

/* Rating */
.stars span{
  font-size:25px;
  cursor:pointer;
  color:gray;
}
.stars span.active{
  color:gold;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>آلة حاسبة علمية</h2>
    <button onclick="toggleTheme()">🌙 تبديل الوضع</button>
  </div>

  <div style="display:flex; gap:20px; flex-wrap:wrap;">

    <!-- Calculator -->
    <div class="calculator">
      <input id="screen" class="screen" disabled>

      <div class="buttons">
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn" onclick="press('/')">/</button>

        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn" onclick="press('*')">*</button>

        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn" onclick="press('-')">-</button>

        <button class="btn" onclick="press('0')">0</button>
        <button class="btn" onclick="press('.')">.</button>
        <button class="btn" onclick="calc()">=</button>
        <button class="btn" onclick="press('+')">+</button>

        <!-- Scientific -->
        <button class="btn" onclick="func('Math.sin')">sin</button>
        <button class="btn" onclick="func('Math.cos')">cos</button>
        <button class="btn" onclick="func('Math.tan')">tan</button>
        <button class="btn" onclick="clearScreen()">C</button>
      </div>
    </div>

    <!-- Explanation -->
    <div class="card" style="flex:1;">
      <h3>طريقة عمل الحاسبة</h3>
      <p>
        هذه الحاسبة تعتمد على JavaScript لتنفيذ العمليات الرياضية.
        يتم إدخال الأرقام والرموز في شاشة العرض ثم يتم تقييمها باستخدام دالة الحساب.
      </p>
      <p>
        العمليات العلمية مثل sin و cos و tan تعتمد على مكتبة Math المدمجة في JavaScript.
      </p>
    </div>

  </div>

  <!-- Rating -->
  <div class="card">
    <h3>تقييم الموقع</h3>
    <div class="stars" id="stars">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>
    <p id="ratingText"></p>
  </div>

</div>

<script>

let screen = document.getElementById("screen");

function press(val){
  screen.value += val;
}

function calc(){
  try{
    screen.value = eval(screen.value);
  }catch{
    screen.value = "خطأ";
  }
}

function clearScreen(){
  screen.value = "";
}

function func(name){
  screen.value += name + "(";
}

function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* Rating */
function rate(star){
  let stars = document.querySelectorAll("#stars span");
  stars.forEach((s,i)=>{
    s.classList.toggle("active", i < star);
  });

  localStorage.setItem("rating", star);
  document.getElementById("ratingText").innerText =
    "شكراً! تقييمك: " + star + "/5";
}

/* Load rating */
window.onload = ()=>{
  let saved = localStorage.getItem("rating");
  if(saved){
    rate(saved);
  }
};

</script>

</body>
</html>
</html>
