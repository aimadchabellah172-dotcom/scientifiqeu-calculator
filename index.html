<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية احترافية</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* عام */
body{
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  animation: fadeIn 1s ease-in-out;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* الرسوم المتحركة */
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Card تصميم */
.card {
  background: rgba(255, 255, 255, 0.08);
  padding: 15px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: transform 0.3s ease, background-color 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
  background-color: rgba(255, 255, 255, 0.1);
}

/* شاشة الآلة الحاسبة */
.screen {
  width: 100%;
  height: 70px;
  font-size: 24px;
  border: none;
  border-radius: 10px;
  padding: 10px;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  transition: background-color 0.3s ease;
}

.screen:focus {
  background: rgba(255, 255, 255, 0.2);
}

/* الأزرار */
.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #334155;
  color: white;
  cursor: pointer;
  transition: transform 0.2s ease, background-color 0.2s ease;
}

.btn:hover {
  background-color: #38bdf8;
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.95);
}

/* الرسم البياني */
canvas {
  background: white;
  border-radius: 10px;
  animation: slideIn 1s ease-out;
}

@keyframes slideIn {
  0% {
    transform: translateY(50px);
    opacity: 0;
  }
  100% {
    transform: translateY(0);
    opacity: 1;
  }
}

/* نجوم التقييم */
.stars span {
  font-size: 30px;
  cursor: pointer;
  color: #555;
  transition: transform 0.3s ease;
}

.stars span.active {
  color: gold;
}

/* التعليقات */
.comment {
  background: rgba(255, 255, 255, 0.1);
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  animation: fadeIn 1s ease-in-out;
}

/* الإدخالات */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  transition: background-color 0.3s ease;
}

input:focus, textarea:focus {
  background: rgba(255, 255, 255, 0.2);
}

</style>
</head>

<body>

<div class="container">

<h2>🧮 آلة حاسبة علمية احترافية</h2>

<!-- 🧮 CALCULATOR -->
<div class="card">

<input id="screen" class="screen" disabled>

<div class="row">
<button class="btn" onclick="add('7')">7</button>
<button class="btn" onclick="add('8')">8</button>
<button class="btn" onclick="add('9')">9</button>
<button class="btn" onclick="add('/')">÷</button>
</div>

<div class="row">
<button class="btn" onclick="add('4')">4</button>
<button class="btn" onclick="add('5')">5</button>
<button class="btn" onclick="add('6')">6</button>
<button class="btn" onclick="add('*')">×</button>
</div>

<div class="row">
<button class="btn" onclick="add('1')">1</button>
<button class="btn" onclick="add('2')">2</button>
<button class="btn" onclick="add('3')">3</button>
<button class="btn" onclick="add('-')">-</button>
</div>

<div class="row">
<button class="btn" onclick="add('0')">0</button>
<button class="btn" onclick="add('.')">.</button>
<button class="btn" onclick="calc()">=</button>
<button class="btn" onclick="add('+')">+</button>
</div>

<div class="row">
<button class="btn" onclick="addFunc('sin')">sin</button>
<button class="btn" onclick="addFunc('cos')">cos</button>
<button class="btn" onclick="addFunc('tan')">tan</button>
<button class="btn" onclick="sqrt()">√</button>
</div>

<div class="row">
<button class="btn" onclick="power()">xʸ</button>
<button class="btn" onclick="log10()">log</button>
<button class="btn" onclick="ln()">ln</button>
<button class="btn" onclick="clearAll()">C</button>
</div>

</div>

<!-- 📊 GRAPH -->
<div class="card">
<h3>📊 الرسم البياني</h3>
<input id="funcs" placeholder="x*x; sin(x); x+2">
<button class="btn" onclick="draw()">رسم</button>
<canvas id="chart"></canvas>
</div>

<!-- 🤖 AI -->
<div class="card">
<h3>🤖 الذكاء الاصطناعي (حل معادلات)</h3>
<input id="ai" placeholder="مثال: 2x+3=7">
<button class="btn" onclick="solve()">حل</button>
<p id="out"></p>
</div>

<!-- ⭐ RATING -->
<div class="card">
<h3>⭐ التقييم</h3>

<div class="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>

<p id="rateText"></p>
</div>

<!-- 💬 COMMENTS -->
<div class="card">
<h3>💬 التعليقات</h3>

<input id="name" placeholder="اسمك">
<textarea id="msg" placeholder="تعليقك"></textarea>

<button class="btn" onclick="addComment()">إرسال</button>

<div id="comments"></div>

</div>

</div>

<script>

let screen=document.getElementById("screen");
let chart;

/* calc */
function add(v){screen.value+=v;}
function addFunc(f){screen.value+=f+"(";}

/* math */
function sqrt(){screen.value=Math.sqrt(eval(screen.value));}
function power(){screen.value+="**";}
function log10(){screen.value=Math.log10(eval(screen.value));}
function ln(){screen.value=Math.log(eval(screen.value));}
function clearAll(){screen.value="";}

function calc(){
try{
let e=screen.value;

e=e.replace(/sin\(/g,"Math.sin(Math.PI/180*");
e=e.replace(/cos\(/g,"Math.cos(Math.PI/180*");
e=e.replace(/tan\(/g,"Math.tan(Math.PI/180*");
e=e.replace(/\^/g,"**");

screen.value=eval(e);
}catch{screen.value="خطأ";}
}

let f=document.getElementById("funcs").value.split(";");
