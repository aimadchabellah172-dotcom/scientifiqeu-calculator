<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آلة حاسبة علمية</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --btn:#e9eef5;
  --accent:#4a90e2;
  --shadow:0 10px 25px rgba(0,0,0,0.08);
}

body.dark{
  --bg:#0b1220;
  --card:#1b2435;
  --text:#f8fafc;
  --btn:#2a354b;
  --accent:#38bdf8;
  --shadow:0 10px 25px rgba(0,0,0,0.4);
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Calculator */
.calculator{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  box-shadow:var(--shadow);
  width:340px;
}

.screen{
  width:100%;
  height:70px;
  font-size:26px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:var(--bg);
  color:var(--text);
  text-align:left;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--btn);
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:var(--accent);
  color:white;
  transform:scale(1.05);
}

/* cards */
.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:var(--shadow);
}

/* rating */
.stars{
  display:flex;
  gap:8px;
  font-size:35px;
  cursor:pointer;
}

.star{
  color:#bbb;
  transition:0.2s;
}

.star.active,
.star:hover{
  color:gold;
  transform:scale(1.2);
}

small{
  opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🧮 آلة حاسبة علمية</h2>
  <button onclick="toggleTheme()">🌙 تبديل الوضع</button>
</div>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

<!-- Calculator -->
<div class="calculator">
  <input id="screen" class="screen" disabled>

  <div class="buttons">

    <button class="btn" onclick="add('7')">7</button>
    <button class="btn" onclick="add('8')">8</button>
    <button class="btn" onclick="add('9')">9</button>
    <button class="btn" onclick="add('/')">÷</button>

    <button class="btn" onclick="add('4')">4</button>
    <button class="btn" onclick="add('5')">5</button>
    <button class="btn" onclick="add('6')">6</button>
    <button class="btn" onclick="add('*')">×</button>

    <button class="btn" onclick="add('1')">1</button>
    <button class="btn" onclick="add('2')">2</button>
    <button class="btn" onclick="add('3')">3</button>
    <button class="btn" onclick="add('-')">-</button>

    <button class="btn" onclick="add('0')">0</button>
    <button class="btn" onclick="add('.')">.</button>
    <button class="btn" onclick="calc()">=</button>
    <button class="btn" onclick="add('+')">+</button>

    <!-- scientific -->
    <button class="btn" onclick="addFunc('sin')">sin</button>
    <button class="btn" onclick="addFunc('cos')">cos</button>
    <button class="btn" onclick="addFunc('tan')">tan</button>
    <button class="btn" onclick="clearAll()">C</button>

  </div>
</div>

<!-- info -->
<div class="card" style="flex:1;">
  <h3>📌 طريقة العمل</h3>
  <p>
    تعتمد الحاسبة على JavaScript مع دعم العمليات الرياضية والدوال العلمية مثل sin و cos و tan.
  </p>
  <p>
    يتم تحويل الدرجات إلى راديان للحساب الصحيح.
  </p>
</div>

</div>

<!-- rating -->
<div class="card">
  <h3>⭐ تقييم الموقع</h3>
  <small>اضغط على النجوم للتقييم</small>

  <div class="stars" id="stars">
    <span class="star" onclick="rate(1)">★</span>
    <span class="star" onclick="rate(2)">★</span>
    <span class="star" onclick="rate(3)">★</span>
    <span class="star" onclick="rate(4)">★</span>
    <span class="star" onclick="rate(5)">★</span>
  </div>

  <p id="rateText"></p>
</div>

</div>

<script>

let screen = document.getElementById("screen");

function add(v){
  screen.value += v;
}

/* scientific functions */
function addFunc(fn){
  screen.value += fn + "(";
}

function calc(){
  try{
    let expr = screen.value;

    // convert sin/cos/tan degrees to radians
    expr = expr.replace(/sin\(/g,"Math.sin(Math.PI/180*");
    expr = expr.replace(/cos\(/g,"Math.cos(Math.PI/180*");
    expr = expr.replace(/tan\(/g,"Math.tan(Math.PI/180*");

    screen.value = eval(expr);
  }catch{
    screen.value = "خطأ";
  }
}

function clearAll(){
  screen.value = "";
}

/* theme */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* rating system */
function rate(n){
  localStorage.setItem("rate", n);
  updateStars(n);
}

function updateStars(n){
  let stars = document.querySelectorAll(".star");

  stars.forEach((s,i)=>{
    s.classList.toggle("active", i < n);
  });

  document.getElementById("rateText").innerText =
    "تقييمك: " + n + " / 5 ⭐";
}

/* load rating */
window.onload = ()=>{
  let r = localStorage.getItem("rate");
  if(r) updateStars(Number(r));
};

</script>

</body>
</html>
